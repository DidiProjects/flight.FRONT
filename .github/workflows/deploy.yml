name: Deploy to Netlify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env for build
        run: |
          printf 'VITE_API_URL=%s\nVITE_APP_URL=%s\nVITE_AUTHOR_NAME=%s\nVITE_AUTHOR_GITHUB=%s\nVITE_FEEDBACK_EMAIL=%s\n' \
            '${{ vars.VITE_API_URL }}' \
            '${{ vars.VITE_APP_URL }}' \
            '${{ vars.VITE_AUTHOR_NAME }}' \
            '${{ vars.VITE_AUTHOR_GITHUB }}' \
            '${{ vars.VITE_FEEDBACK_EMAIL }}' > .env

      - name: Build project
        run: npm run build

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: netlify deploy --dir=./dist --prod
